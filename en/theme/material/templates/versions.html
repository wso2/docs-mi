{% extends "base.html" %}

{% block styles %}
  {{ super() }}
  <link rel="stylesheet" href="{{ 'assets/css/versions.css' | url }}">
{% endblock %}

{% block site_nav %}<!-- Removed Nav -->{% endblock %}

{% block container %}
  <div class="md-content">
    <article class="md-content__inner md-typeset">

      {{ page.content }}

      <h3 id="current-version-stable">Current version (Stable)</h3>

      <table>
        <tbody>
          <tr>
            <th id="current-version-number"><!-- Populated by JS --></th>
            <td><a id="current-version-documentation-link" href="#" target="_blank" rel="noopener noreferrer">Documentation</a></td>
            <td><a id="current-version-release-notes-link" href="#" target="_blank" rel="noopener noreferrer">Release Notes</a></td>
          </tr>
        </tbody>
      </table>

      <p>This is the current stable version of the project.</p>

      <hr />

      <h3>Past Versions</h3>

      <table>
        <tbody id="previous-versions">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </article>
  </div>
{% endblock %}
